---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: brotherlogic-os
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:

  - type: dnf
    repos:
      copr:
        - atim/starship
        - chronoscrat/devpod
        - a-zhn/ghostty
        - solopasha/hyprland
        - erikreider/SwayNotificationCenter
    install:
      packages:
        - micro
        - starship
        - emacs
        - devpod
        - hyprland
        - hyprland-qtutils
        - swaybg
        - ghostty
        - gh
        - cdparanoia
        - docker
        - golang
        - nodejs
        - npm
        - waybar
        - fontawesome-fonts
        - bitstream-vera-sans-mono-fonts
        - unzip
        - rpi-imager
        - SwayNotificationCenter
        - chezmoi
        - age
        - powertop
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.gnome.Loupe
          - io.podman_desktop.PodmanDesktop
          - com.google.Chrome
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully

  - type: kargs
    kargs:
      - amdgpu.dcdebugmask=0x10
      - modprobe.blacklist=ucsi_acpi
      - rtc_cmos.use_acpi_alarm=1
      - nvme.noacpi=1
      - nvme_core.default_ps_max_latency_us=0
      - amdgpu.sg_display=0

  - type: rpm-ostree
    repos:
      -  antigravity.repo
      -  vscode.repo
    install:
      - antigravity
      - code

  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: script
    snippets:
      - "echo '--- Installing talosctl binary ---' && curl -Lo /usr/bin/talosctl https://github.com/siderolabs/talos/releases/latest/download/talosctl-linux-amd64 && chmod +x /usr/bin/talosctl"
      - "echo '--- Building devcontainer-manager binary ---' && rm -rf /tmp/devcontainer-manager && git clone https://github.com/brotherlogic/devcontainer-manager.git /tmp/devcontainer-manager && cd /tmp/devcontainer-manager && go build -v -o /usr/bin/devcontainer-manager main.go"
      - "echo '--- Configuring devcontainer-manager service ---' && sed -e 's/\\\\|/|/g' -e 's|%PROJECT_DIR%|%h/devcontainer-manager|g' -e 's|%GO_CMD%|/usr/bin/go|g' -e '/^\\[Unit\\]/a ConditionUser=!root' /tmp/devcontainer-manager/service-file > /usr/lib/systemd/user/devcontainer-manager.service && systemctl --global enable devcontainer-manager.service && ls -l /usr/lib/systemd/user/devcontainer-manager.service"
      - "mkdir -p /usr/share/backgrounds && curl -L 'https://fedoraproject.org/w/uploads/1/1c/F43-DAY_final_day_%28small%29.png' -o /usr/share/backgrounds/f43-day.png"
      - "mkdir -p /usr/share/fonts/jost && curl -L https://github.com/indestructible-type/Jost/releases/download/3.5/Jost.zip -o /tmp/jost.zip && unzip -o /tmp/jost.zip -d /usr/share/fonts/jost && fc-cache -f /usr/share/fonts/jost"
      - "npm install -g @google/gemini-cli"
      - "chmod +x /usr/bin/set-hostname.sh"
      - "systemctl enable set-hostname.service"

  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: script
    snippets:
      - "dconf update"
