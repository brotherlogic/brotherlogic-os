general {
    no_fade_in = true
    immediate_render = false
    ignore_empty_input = true
}

auth {
    pam {
        enabled = true
        module = hyprlock
    }
}

background {
    monitor = 
    path = /usr/share/backgrounds/f43-day.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 0
}

input-field {
    monitor = 
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_color = rgb(204, 34, 34)
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = 
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 64
    font_family = Jost
    position = 0, 80
    halign = center
    valign = center
}
